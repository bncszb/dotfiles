gui:
  nerdFontsVersion: "3"
  spinner:
    frames:
      - "⠋"
      - "⠙"
      - "⠹"
      - "⠸"
      - "⠼"
      - "⠴"
      - "⠇"
      - "⠏"
  # DRACULA
  theme:
    activeBorderColor:
      - "#FF79C6"
      - bold
    inactiveBorderColor:
      - "#BD93F9"
    searchingActiveBorderColor:
      - "#8BE9FD"
      - bold
    optionsTextColor:
      - "#6272A4"
    selectedLineBgColor:
      - "#6272A4"
    inactiveViewSelectedLineBgColor:
      - bold
    cherryPickedCommitFgColor:
      - "#6272A4"
    cherryPickedCommitBgColor:
      - "#8BE9FD"
    markedBaseCommitFgColor:
      - "#8BE9FD"
    markedBaseCommitBgColor:
      - "#F1FA8C"
    unstagedChangesColor:
      - "#FF5555"
    defaultFgColor:
      - "#F8F8F2"
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --line-numbers --side-by-side
os:
  editPreset: vscode
customCommands:
  - key: "<c-v>"
    command: "code ."
    description: "Open repo in VS Code"
    context: "global"
    loadingText: "Opening VS Code..."
  - key: "p"
    context: "global"
    description: "Pull Options"
    command: "{{.Form.PullAction}}"
    prompts:
      - type: "menu"
        title: "Choose Pull Type"
        key: "PullAction"
        options:
          - name: "Regular Pull"
            description: "Perform a normal git pull"
            value: "git pull"
          - name: "Pull with Stash"
            description: "Stash changes, pull, then pop the stash"
            value: "git stash && git pull && git stash pop"
